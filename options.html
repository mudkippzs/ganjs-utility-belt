<!DOCTYPE html>
<html>
<head>
  <title>Extension Options</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      padding: 30px;
      max-width: 700px;
      margin: auto;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
      color: #2c3e50;
    }

    section {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      padding: 20px 25px;
      margin-bottom: 30px;
      transition: box-shadow 0.2s ease;
    }

    section:hover {
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
    }

    h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #34495e;
    }

    label {
      display: block;
      margin: 10px 0;
      font-size: 14px;
    }

    select,
    input[type="checkbox"] {
      margin-left: 10px;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:active {
      transform: scale(0.97);
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1e1e1e;
        color: #ddd;
      }

      section {
        background: #2c2c2c;
        box-shadow: 0 2px 6px rgba(255, 255, 255, 0.04);
      }

      h1, h2 {
        color: #eee;
      }

      label {
        color: #ccc;
      }

      button {
        background-color: #2980b9;
      }

      button:hover {
        background-color: #2471a3;
      }
    }
  </style>
</head>
<body>
  <h1>Sticky Notes Options</h1>

  <section>
    <h2>Preferences</h2>
    <label>
      Enable:
      <input type="checkbox" id="enableSticky">
    </label>
    <label>
      Theme:
      <select id="noteTheme">
        <option value="#fffae6">Yellow</option>
        <option value="#e6faff">Blue</option>
        <option value="#e6ffe6">Green</option>
        <option value="#fff0f5">Pink</option>
      </select>
    </label>
    <label>
      Font:
      <select id="noteFont">
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times</option>
      </select>
    </label>
  </section>

  <section>
    <h2>Export Notes</h2>
    <p style="font-size: 13px; color: #666; margin-bottom: 12px;">
      Download all your notes as a JSON backup file.
    </p>
    <button id="exportNotes">Export All Notes to JSON</button>
  </section>

  <script src="options.js"></script>
</body>
</html>
