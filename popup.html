<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ganj's Utility Belt</title>
  <link rel="stylesheet" href="styles.css">
  <script src="modules/tabSetSaver.js"></script>
  <script src="modules/pomodoro.js"></script>
  <script src="popup.js" defer></script>
</head>
<body>
  <h1>🛠️ Ganj's Utility Belt</h1>

  <div class="section collapsible" id="quickActionsSection">
    <h2 class="section-toggle">🚀 Quick Actions <span class="chevron">▾</span></h2>
    <div class="section-body">
      <button id="openQuickActions" class="feature-btn">🚀 Quick Actions Hub</button>
      <div class="shortcut-hint">Ctrl+Shift+Q</div>
    </div>
  </div>

  <div class="section collapsible" id="devToolsSection">
    <h2 class="section-toggle">💻 Developer Tools <span class="chevron">▾</span></h2>
    <div class="section-body">
      <div class="tool-grid">
        <button id="openCSSEditor" class="tool-btn">🎨 CSS Editor</button>
        <button id="openJSEditor" class="tool-btn">💻 JS Runner</button>
        <button id="openCrossTabSearch" class="tool-btn">🔍 Tab Search</button>
        <button id="openColorTools" class="tool-btn">🎨 Color Tools</button>
        <button id="openNetworkTools" class="tool-btn">🌐 Network</button>
        <button id="openDataTools" class="tool-btn">📊 Data Tools</button>
      </div>
    </div>
  </div>

  <div class="section collapsible" id="productivitySection">
    <h2 class="section-toggle">⚡ Productivity <span class="chevron">▾</span></h2>
    <div class="section-body">
      <div class="tool-grid">
        <button id="openAutoRefresh" class="tool-btn">⏱️ Auto-Refresh</button>
        <button id="openTextTools" class="tool-btn">📝 Text Tools</button>
        <button id="openScreenshot" class="tool-btn">📸 Screenshot</button>
        <button id="openRedirector" class="tool-btn">🔄 Redirector</button>
      </div>
    </div>
  </div>

  <div class="section collapsible" id="imageToolsSection">
    <h2 class="section-toggle">🖼️ Image Tools <span class="chevron">▾</span></h2>
    <div class="section-body">
      <button id="toggleImageMagnifier" class="tool-btn">🔍 Image Magnifier</button>
      <div class="shortcut-hint">Ctrl+Shift+M</div>
    </div>
  </div>

  <div class="section collapsible" id="tabManagementSection">
    <h2 class="section-toggle">🗃️ Tab Management <span class="chevron">▾</span></h2>
    <div class="section-body">
      <div class="tool-grid">
        <button id="groupTabs">📦 Group Tabs</button>
        <button id="ungroupTabs">🧹 Ungroup Tabs</button>
      </div>
    </div>
  </div>

  <div class="section collapsible" id="tabSetsSection">
    <h2 class="section-toggle">📂 Tab Sets <span class="chevron">▾</span></h2>
    <div class="section-body">
      <form id="saveForm">
        <input type="text" id="setName" placeholder="Set name" required />
        <button type="submit">💾 Save</button>
      </form>
      <div id="setsContainer"></div>
    </div>
  </div>

  <div class="section collapsible" id="pomodoroSection">
    <h2 class="section-toggle">⏱️ Pomodoro Focus <span class="chevron">▾</span></h2>
    <div class="section-body">
      <input id="pomodoroTask" type="text" placeholder="What are you focusing on?" />
      <div id="pomodoroControls">
        <div id="pomodoroTimer">25:00</div>
        <button id="pomodoroStart">▶️ Start Focus</button>
        <button id="pomodoroCancel" style="display: none;">🛑 Cancel</button>
        <div class="pomodoro-options">
          <label><input type="checkbox" id="toggleFloatingTimer" /> Floating Timer</label>
          <label><input type="checkbox" id="toggleAutoFocus" /> Auto-start Next</label>
          <button id="testNotifications">🔔 Test</button>
          <button id="viewReport">📊 Report</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="options.html" target="_blank">⚙️ Options</a>
  </div>
</body>
</html>
